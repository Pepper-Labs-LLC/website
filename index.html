<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepper Labs LLC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .tagline {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .contact {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #eee;
        }

        .contact h2 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .email {
            font-size: 1.1em;
            color: #764ba2;
            text-decoration: none;
            font-weight: 500;
        }

        .email:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2em;
            }

            .tagline {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pepper Labs LLC</h1>
        <p class="tagline">
            We make apps and websites for people to use.
        </p>
        <div class="contact">
            <h2>Contact Us</h2>
            <a href="mailto:pepperlabs8@gmail.com" class="email">pepperlabs8@gmail.com</a>
        </div>
    </div>
</body>
</html>
